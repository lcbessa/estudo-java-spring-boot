spring:
  application:
    name: libraryapi
  datasource:
    url: "jdbc:h2:file:./data/mydb"
    username: "sa"
    #    password: password
    pool-size: 30
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
